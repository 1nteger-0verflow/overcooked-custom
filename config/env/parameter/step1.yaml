forward_view_size: # 各エージェントの前方の視野範囲(0は制限なし)
  - 5
  - 5
side_view_size: # 各エージェントの左右の視野範囲(0は制限なし)
  - 5
  - 5
restrict_observation: true # 観測情報を視野範囲内に制限する
capacity: # 各エージェントの持てるものの個数
  - 3
  - 3
plate_count: 60 # 皿が何枚あるか
sink_capacity: 60 # シンクに置ける皿の最大枚数
order_max: 1 # 最大注文可能数(追加注文はなし)
wait_line_max: 1 # 一般客が入口に並ぶ人数の上限
dirt_appear_rate: 0.02 # 毎ステップの汚れ発生率
dirtiness_max: 1 # 汚れ度合いの上限(汚れを掃除して消えるまでに何回interactionが必要か)
cooking_duration_range: [1.0, 1.0] # 調理時間の振れ幅(標準時間に掛ける係数の範囲)
volume_range: [1.0, 1.0] # 料理の分量の振れ幅(標準分量に掛ける係数の範囲)
check_time_max: 1 # 会計にかかる最大ステップ
